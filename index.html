<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Institute of Digital Risk — Training and deploying the next generation of digital, cyber and AI risk practitioners.">
  <title>Institute of Digital Risk | IDR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

</head>

<body>
  <!-- ============================================================
       NAVIGATION BAR
        - Logo on the left, links on the right
  ============================================================ -->
  <header class="navbar" id="navbar">
    <nav class="nav-container">
      <a href="#home" class="nav-logo">
        <img
          src="TextLogo.svg"
          alt="IDR Text icon"
          width="auto"
          height="auto"
          class="logo-icon"
        >
      </a>

      <!-- HAMBURGER BUTTON — only visible on mobile, hidden on desktop -->
    
      <button class="hamburger" id="hamburger" aria-label="Open menu">
        <!-- aria-label helps blind users who use screen readers understand what this button does -->
        <span></span> <!-- These 3 spans become the 3 lines of the hamburger icon via CSS -->
        <span></span>
        <span></span>
      </button>

      <!-- NAVIGATION LINKS -->
      <ul class="nav-links" id="nav-links">
        <!-- ul = unordered list — semantically correct way to make a nav menu -->
        <li><a href="#about"     class="nav-link">About</a></li>
        <li><a href="#services"  class="nav-link">Services</a></li>
        <li><a href="#community" class="nav-link">Community</a></li>
        <li><a href="#contact"   class="nav-link nav-cta">Get Involved</a></li>
        <!-- nav-cta = call-to-action link, styled as an orange button -->
      </ul>

    </nav>
  </header>
